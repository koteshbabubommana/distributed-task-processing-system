version: '3.9'

services:

  redis:
    image: redis:7
    container_name: redis_server
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: backend_api
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: .
    container_name: celery_worker
    command: python -m celery -A app.worker worker --loglevel=info
    depends_on:
      - redis